name: Build and push image

on:
  push:
    tags:
      # Matches v1.2.3 (each component is one or more digits). Pre-release or
      # 4-part tags like v1.2.3-rc1 / v1.2.3.4 deliberately do not match.
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive image tag
        id: meta
        run: |
          # Strip the leading "v": v1.2.3 -> 1.2.3
          version="${GITHUB_REF_NAME#v}"
          # GHCR image names must be lowercase.
          image="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/dam-release-collector"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "image=${image}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Exactly one tag: 1.2.3. No 1, 1.2, or latest.
          tags: ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
